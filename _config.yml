# Site settings
title: Alvar Maciel
description: 'Docencia, Tecnología, Arte y Ciencia'
url: 'http://alvarmaciel.github.io/'
baseurl: '/'
# google_analytics: 'UA-XXXXXX-X'
# disqus_shortname: 'your-disqus-name'

author:
  name: 'Alvar Maciel'
  email: alvarmaciel@gmail.com
  twitter_username: amaciel
  facebook_username: alvar.maciel
  github_username:  alvarmaciel
  linkedin_username:  

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

gems: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
